<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Стейкхолдеры — B2BAPP</title><link rel="stylesheet" href="../shared.css">
<style>
.raci-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;background:var(--card);border-radius:10px;padding:14px 18px;border:1px solid var(--line)}
.raci-item{display:flex;align-items:center;gap:8px;font-size:12px}
.raci-badge{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.raci-desc{color:var(--mute)}
.r-R{background:rgba(231,76,60,.2);color:#e74c3c}
.r-A{background:rgba(230,126,34,.2);color:#e67e22}
.r-C{background:rgba(68,114,196,.2);color:#6a9ee8}
.r-I{background:rgba(127,143,166,.15);color:var(--mute)}
</style>
</head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div style="display:flex;align-items:center;gap:12px">
    <a class="back-btn" href="../index.html">← Главная</a>
    <span style="font-size:14px;font-weight:700;color:#fff">🤝 Стейкхолдеры + RACI</span>
  </div>
  <div style="font-size:11px;color:#7f8fa6">B2BAPP | Данные на <span id="upd" style="color:#FFC803">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span></div>
</header>
<div class="content">
  <div class="raci-legend">
    <strong style="font-size:11px;color:#7f8fa6;align-self:center;margin-right:4px">Расшифровка RACI:</strong>
    <div class="raci-item"><div class="raci-badge r-R">R</div><div><strong style="color:#e74c3c">Responsible</strong><div class="raci-desc">Исполнитель — делает работу</div></div></div>
    <div class="raci-item"><div class="raci-badge r-A">A</div><div><strong style="color:#e67e22">Accountable</strong><div class="raci-desc">Ответственный — принимает решение</div></div></div>
    <div class="raci-item"><div class="raci-badge r-C">C</div><div><strong style="color:#6a9ee8">Consulted</strong><div class="raci-desc">Консультант — даёт экспертизу</div></div></div>
    <div class="raci-item"><div class="raci-badge r-I">I</div><div><strong style="color:#7f8fa6">Informed</strong><div class="raci-desc">Информируемый — получает статус</div></div></div>
  </div>
  <div style="margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap">
    <input id="srch" style="background:#1e2d3d;border:1px solid #253850;color:#e8edf5;border-radius:6px;padding:6px 12px;font-size:12px;width:240px;outline:none" placeholder="🔍 Поиск..." oninput="filter()">
    <span id="cnt" style="font-size:11px;color:#7f8fa6;align-self:center"></span>
  </div>
  <table class="tbl" id="tbl"><thead><tr><th>Имя</th><th>Роль в проекте</th><th>Команда / Отдел</th><th>RACI</th><th>Контакт / Роль</th></tr></thead>
  <tbody id="tbody"></tbody></table>
</div>
<script>
let DATA=[];
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d.stakeholders||[];
  document.getElementById('upd').textContent=d.updated||'—';
  render(DATA);
  makeSortable(document.getElementById('tbl'));
});
function raciBadge(r){return r.split('').map(c=>`<span class="badge r-${c}" style="margin-right:3px">${c}</span>`).join('');}
function render(rows){
  document.getElementById('tbody').innerHTML=rows.map(s=>`<tr>
    <td style="font-weight:600;color:#fff;white-space:nowrap">${s.name}</td>
    <td>${s.role}</td>
    <td style="font-size:11px;color:#7f8fa6">${s.team}</td>
    <td>${raciBadge(s.raci||'')}</td>
    <td style="font-size:11px;color:#7f8fa6">${s.contact||'—'}</td>
  </tr>`).join('');
  document.getElementById('cnt').textContent=rows.length+' участников';
}
function filter(){const q=document.getElementById('srch').value.toLowerCase();render(DATA.filter(r=>JSON.stringify(r).toLowerCase().includes(q)));}
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
