<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Стейкхолдеры + RACI — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">🤝 Стейкхолдеры + RACI</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.stakeholders || [];
const RCLS={'R':'err','A':'warn','C':'blue','I':'gray'};
document.getElementById('root').innerHTML=`<table class="tbl">
  <thead><tr><th>Имя</th><th>Роль в проекте</th><th>Команда</th><th>RACI</th><th>Контакт</th></tr></thead>
  <tbody>${items.map(s=>`<tr>
    <td style="font-weight:600;color:#fff">${s.name}</td>
    <td>${s.role}</td>
    <td style="font-size:11px;color:var(--mute)">${s.team}</td>
    <td>${(s.raci||'').split('').map(c=>`<span class="badge badge-${RCLS[c]||'gray'}" style="margin-right:2px">${c}</span>`).join('')}</td>
    <td style="font-size:11px;color:var(--mute)">${s.contact}</td>
  </tr>`).join('')}</tbody></table>`;

});
</script></body></html>
