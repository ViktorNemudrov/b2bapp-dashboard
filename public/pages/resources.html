<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ресурсный план — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar(); initTheme();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">👥 Ресурсный план</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span><button class="pdf-btn" onclick="toggleTheme()" id="themeBtn" title="Переключить тему" style="margin-left:8px">🌙</button></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
AUTH_READY.then(()=>{
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';

const rp = d.resourcePlan || [];
if(!rp.length){
  document.getElementById('root').innerHTML=renderEmptyState('Нет данных, запустите обновление');
} else {
  // Каждый ресурс приводим к единому виду {person, role, monthly:{YYYY-MM: %}},
  // т.к. схема resourcePlan менялась между обновлениями данных (см. CLAUDE.md):
  // сейчас months приходит массивом [{month,hoursPlanned}] в часах, без имени/fte —
  // имя и реальный fte ресурса берём из ganttV2.resources[] по id===resourceId.
  const WORK_DAYS_PER_MONTH=21; // ~21 рабочий день/мес (WORK_START_H..WORK_END_H в index.html = 8ч/день)
  const resourceById={};
  (d.ganttV2&&d.ganttV2.resources||[]).forEach(gr=>{resourceById[gr.id]=gr;});
  const norm = rp.map(r=>{
    const gr = resourceById[r.resourceId];
    // fte может меняться по ходу проекта (напр. выход на полную ставку) —
    // gr.fteFull/gr.fromFull, если есть, переопределяют gr.fte с этого месяца.
    function fteForMonth(month){
      if(gr && gr.fteFull!=null && gr.fromFull && month>=gr.fromFull.slice(0,7)) return gr.fteFull;
      return r.fte!=null?r.fte:(gr?gr.fte:1)||1;
    }
    let monthly=r.monthly;
    if(!monthly && Array.isArray(r.months)){
      monthly={};
      r.months.forEach(m=>{const cap=8*WORK_DAYS_PER_MONTH*fteForMonth(m.month);monthly[m.month]=Math.round(m.hoursPlanned/cap*100);});
    } else if(!monthly && r.months && typeof r.months==='object'){
      monthly=r.months;
    }
    return {
      person:r.person||r.name||(gr&&gr.name)||r.resourceId,
      role:r.role||(gr&&gr.role)||(r.resourceId||'').replace(/-\d+$/,''),
      monthly:monthly||{}
    };
  });
  const allMonths=new Set();
  norm.forEach(r=>Object.keys(r.monthly).forEach(m=>allMonths.add(m)));
  const months=[...allMonths].sort(); // "YYYY-MM" ключи — с января 2026, лексикографическая сортировка = хронологическая
  function heatClass(v){
    if(v==null||v==='') return 'heat-0';
    const n=parseFloat(v);
    if(isNaN(n)) return 'heat-0';
    if(n>=100) return 'heat-high';
    if(n>=70) return 'heat-mid';
    return 'heat-low';
  }
  const html = `<table class="tbl heatmap-table" id="tbl">
    <thead><tr><th>Человек</th><th>Роль</th>${months.map(m=>`<th>${m}</th>`).join('')}</tr></thead>
    <tbody>${norm.map(r=>`<tr>
      <td style="font-weight:600;color:var(--text)">${r.person}</td>
      <td style="color:var(--mute)">${r.role}</td>
      ${months.map(m=>{const v=r.monthly[m];return `<td class="${heatClass(v)}">${v!=null?v+'%':'·'}</td>`;}).join('')}
    </tr>`).join('')}</tbody></table>
  <div style="margin-top:16px;display:flex;gap:12px;font-size:11px">
    <span style="color:#2ecc71">■ &lt;70% — норма</span>
    <span style="color:#e67e22">■ 70-99% — напряжённо</span>
    <span style="color:#e74c3c">■ ≥100% — перегруз</span>
    <span style="color:var(--mute)">■ · — не в проекте</span>
  </div>`;
  document.getElementById('root').innerHTML=html;
  makeSortable(document.getElementById('tbl'));
}
}).catch(showFetchError);
});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
