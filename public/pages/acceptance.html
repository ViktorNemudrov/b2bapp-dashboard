<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Критерии приёмки MVP — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">✅ Критерии приёмки MVP</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.acceptance || [];
const SCLS={'✅':'ok','🟡':'warn','⬜':'gray','❌':'err'};
document.getElementById('root').innerHTML=`<table class="tbl" id="tbl">
  <thead><tr><th>Область</th><th>Критерий</th><th>Метрика / Мера</th><th>Статус</th></tr></thead>
  <tbody>${items.map(a=>{
    const cls=Object.entries(SCLS).find(([k])=>a.status&&a.status.startsWith(k))?.[1]||'blue';
    return `<tr>
      <td><span class="badge badge-blue">${a.area}</span></td>
      <td>${a.criterion}</td>
      <td style="font-size:11px;color:var(--mute)">${a.measure}</td>
      <td><span class="badge badge-${cls}">${a.status}</span></td>
    </tr>`;}).join('')}</tbody></table>`;
makeSortable(document.getElementById('tbl'));
});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
