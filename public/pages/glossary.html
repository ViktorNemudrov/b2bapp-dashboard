<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Глоссарий — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar(); initTheme();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">📖 Глоссарий</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span><button class="pdf-btn" onclick="toggleTheme()" id="themeBtn" title="Переключить тему" style="margin-left:8px">🌙</button></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.glossary || [];
document.getElementById('root').innerHTML=`
<div style="margin-bottom:12px"><input id="gs" class="search-input" placeholder="Поиск..." oninput="gf()"></div>
<div id="glist" class="cards-grid">${items.map(g=>`<div class="info-card">
  <h3 style="color:var(--yel)">${g.term}</h3>
  <p style="font-size:11px;color:var(--mute);margin-top:4px">${g.definition}</p>
</div>`).join('')}</div>`;
window.gf=function(){
  const q=document.getElementById('gs').value.toLowerCase();
  document.querySelectorAll('#glist .info-card').forEach(c=>{
    c.style.display=c.textContent.toLowerCase().includes(q)?'':'none';
  });
};

}).catch(showFetchError);
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
