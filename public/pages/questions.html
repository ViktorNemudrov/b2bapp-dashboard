<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Открытые вопросы — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">❓ Открытые вопросы</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.questions || [];
const SCLS={'Открыт':'err','Решён':'ok','В работе':'warn','Закрыт':'gray'};
document.getElementById('root').innerHTML=`<table class="tbl">
  <thead><tr><th>ID</th><th>Вопрос</th><th>Ответственный</th><th>Дедлайн</th><th>Статус</th></tr></thead>
  <tbody>${items.map(q=>{
    const cls=Object.entries(SCLS).find(([k])=>q.status&&q.status.includes(k))?.[1]||'blue';
    return `<tr>
      <td><span class="badge badge-yel">${q.id}</span></td>
      <td>${q.question}</td>
      <td style="font-size:11px;color:var(--mute)">${q.owner}</td>
      <td style="font-size:11px;color:var(--mute)">${q.deadline}</td>
      <td><span class="badge badge-${cls}">${q.status}</span></td>
    </tr>`;}).join('')}</tbody></table>`;

});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
