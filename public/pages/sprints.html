<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Бэклог по спринтам — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">🏃 Бэклог по спринтам</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.sprints || [];
document.getElementById('root').innerHTML=`<table class="tbl">
  <thead><tr><th>#</th><th>Спринт / Задача</th><th>Роль</th><th>Дни</th><th>Старт</th><th>Конец</th><th>Зависимости</th><th>Приоритет</th></tr></thead>
  <tbody>${items.filter(r=>r[0]&&r[0]!=='None').map((r,i)=>`<tr>
    <td style="color:var(--mute);font-size:10px">${i+1}</td>
    <td>${r[0]||''}</td>
    <td><span class="badge badge-blue">${r[1]||''}</span></td>
    <td style="text-align:center">${r[2]||''}</td>
    <td style="color:var(--mute);font-size:11px">${r[3]||''}</td>
    <td style="color:var(--mute);font-size:11px">${r[4]||''}</td>
    <td style="font-size:11px;color:var(--mute)">${r[5]||''}</td>
    <td>${r[6]?`<span class="badge badge-warn">${r[6]}</span>`:''}</td>
  </tr>`).join('')}</tbody></table>`;

});
</script></body></html>
