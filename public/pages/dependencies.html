<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Внешние зависимости — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">🔗 Внешние зависимости</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.dependencies || [];
const SCLS={'Подтверждено':'ok','Согласовано':'ok','В работе':'warn','Ожидание':'err','Нет':'err'};
document.getElementById('root').innerHTML=`<table class="tbl">
  <thead><tr><th>ID</th><th>Система</th><th>Описание</th><th>Владелец</th><th>Статус</th><th>Риск</th></tr></thead>
  <tbody>${items.map(dep=>{
    const cls=Object.entries(SCLS).find(([k])=>dep.status&&dep.status.includes(k))?.[1]||'blue';
    return `<tr>
      <td><span class="badge badge-blue">${dep.id}</span></td>
      <td style="font-weight:600;color:#fff">${dep.system}</td>
      <td style="font-size:11px;color:var(--mute)">${dep.desc}</td>
      <td style="font-size:11px">${dep.owner}</td>
      <td><span class="badge badge-${cls}">${dep.status}</span></td>
      <td style="font-size:11px;color:#e67e22">${dep.risk}</td>
    </tr>`;}).join('')}</tbody></table>`;

});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
