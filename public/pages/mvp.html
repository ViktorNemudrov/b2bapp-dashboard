<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MVP по кварталам — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">🏆 MVP по кварталам</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
// §6.3: производная от ganttV2 — стори группируются по кварталу расчётной даты окончания
const gv = d.ganttV2;
const stories = (gv && gv.items || []).filter(i=>i.type==='story' && i.end);
if(!stories.length){
  document.getElementById('root').innerHTML=renderEmptyState('Нет данных, запустите обновление');
} else {
  const QC=['#4472C4','#e67e22','#2ecc71','#9b59b6','#e74c3c','#1abc9c'];
  function quarterKey(dateStr){
    const dt=new Date(dateStr);
    const q=Math.floor(dt.getMonth()/3)+1;
    return {label:`Q${q} ${dt.getFullYear()}`, sort:dt.getFullYear()*10+q};
  }
  const byQ={};
  stories.forEach(s=>{
    const {label,sort}=quarterKey(s.end);
    (byQ[label]=byQ[label]||{sort,items:[]}).items.push(s);
  });
  const entries=Object.entries(byQ).sort((a,b)=>a[1].sort-b[1].sort);
  document.getElementById('root').innerHTML=entries.map(([q,{items}],i)=>`
    <div style="margin-bottom:24px">
      <div style="font-size:14px;font-weight:800;color:${QC[i%QC.length]};margin-bottom:12px;border-left:4px solid ${QC[i%QC.length]};padding-left:12px">${q}</div>
      <div class="cards-grid">${items.map(s=>`<div class="info-card">
        <h3>${jiraLink(s.key)} ${s.summary||''}</h3>
        <p style="font-size:11px;color:var(--mute);margin-bottom:8px">Эпик: ${s.epic||'—'} · готово к ${s.end}</p>
      </div>`).join('')}</div>
    </div>`).join('');
}
});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
