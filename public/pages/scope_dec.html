<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Скоуп до 10.12.2026 — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar(); initTheme();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">📅 Скоуп до 10.12.2026</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span><button class="pdf-btn" onclick="toggleTheme()" id="themeBtn" title="Переключить тему" style="margin-left:8px">🌙</button></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
AUTH_READY.then(()=>{
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';

// §3.8/§6.3: основной блок — mvpScope (расчёт из ganttV2)
const ms = d.mvpScope;
const prio=s=>parseInt((typeof s==='string'?s:(s.name||s.summary||'')).match(/^(\d+)/)?.[1]||999);
const line=s=>{
  if(typeof s==='string')return `<div class="scope-item">${s}</div>`;
  const readyNote=s.readyDate?` <span style="color:var(--mute)">— готово ${s.readyDate}</span>`:'';
  return `<div class="scope-item">${s.key?jiraLink(s.key)+' ':''}${s.name||s.summary||''}${readyNote}</div>`;
};
let primaryHtml;
if(!ms || (Array.isArray(ms)&&!ms.length) || (!Array.isArray(ms)&&!ms.inStories?.length&&!ms.outStories?.length)){
  primaryHtml = renderEmptyState('Нет данных, запустите обновление');
} else if(Array.isArray(ms)){
  // Скилл пока не даёт story-уровень (нужен ganttV2.items) — плоский приоритизированный список эпиков
  const STATUS_CLS={critical:'badge-err',high:'badge-warn',medium:'badge-yel'};
  const sorted=[...ms].sort((a,b)=>(a.priority??999)-(b.priority??999));
  primaryHtml = `<div style="font-size:10px;color:var(--mute);margin-bottom:8px">Разбивка по стори (входит/не входит) недоступна — в ganttV2 нет story-уровня. Показан приоритизированный список эпиков.</div>`+
    sorted.map(e=>`<div class="scope-item">${e.epic?jiraLink(e.epic)+' ':''}${e.name||''} <span class="badge ${STATUS_CLS[e.status]||'badge-blue'}" style="margin-left:6px">${e.status||'—'}</span></div>`).join('');
} else {
  const inS=ms.inStories||[], outS=ms.outStories||[];
  primaryHtml = `<div class="scope-grid" style="grid-template-columns:1fr 1fr">
    <div class="scope-col in-col"><h4>✅ Входит в веху</h4>${[...inS].sort((a,b)=>prio(a)-prio(b)).map(line).join('')||'—'}</div>
    <div class="scope-col out-col"><h4>❌ Не входит (расчётная дата готовности)</h4>${[...outS].sort((a,b)=>prio(a)-prio(b)).map(line).join('')||'—'}</div>
  </div>${ms.rationale?`<p style="font-size:11px;color:var(--mute);margin-top:10px">${ms.rationale}</p>`:''}`;
}

// Детализация по эпикам — существующий вычисляемый реестр data.scope_dec[] (готовность каждого эпика к вехе)
const sc = d.scope_dec || [];
const STATUS={'✅ Готово':'ok','🟡 Частично':'warn','⬜ После 10.12':'gray'};
const detailHtml = sc.length ? `<table class="tbl" id="tbl">
  <thead><tr><th>Эпик</th><th>Содержание</th><th>Задач всего</th><th>Готово к 10.12</th><th>%</th><th>Статус</th></tr></thead>
  <tbody>${sc.map(s=>{
    const pct=s.total?Math.round((parseInt(s.ready)||0)/(parseInt(s.total)||1)*100):0;
    const cls=Object.entries(STATUS).find(([k])=>s.status&&s.status.includes(k.substring(0,2)))?.[1]||'blue';
    return `<tr>
      <td style="font-weight:600;color:var(--text);min-width:200px">${s.epic}</td>
      <td style="font-size:11px;color:var(--mute)">${s.content}</td>
      <td style="text-align:center">${s.total}</td>
      <td style="text-align:center;color:var(--yel);font-weight:700">${s.ready}</td>
      <td style="text-align:center"><div class="prog-bar" style="min-width:60px"><div class="prog-fill" style="width:${pct}%;background:${pct>=100?'#2ecc71':pct>=50?'#e67e22':'#e74c3c'}"></div></div><span style="font-size:10px;color:var(--mute)">${pct}%</span></td>
      <td><span class="badge badge-${cls}">${s.status}</span></td>
    </tr>`;}).join('')}</tbody></table>` : '';

document.getElementById('root').innerHTML = primaryHtml +
  (detailHtml?`<div class="sec-title" style="margin-top:24px">Детализация по эпикам</div>${detailHtml}`:'');
makeSortable(document.getElementById('tbl'));
}).catch(showFetchError);
});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
