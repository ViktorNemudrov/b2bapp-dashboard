<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Реестр допущений — B2BAPP</title><link rel="stylesheet" href="../shared.css"></head><body>
<div class="layout">
<div id="sidebar-root"></div>
<script src="../shared-nav.js"></script><script>renderSidebar(); initTheme();
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  mountFreshness('freshness', d.refreshedAt, d.updated);
}).catch(()=>{});</script>
<div class="main">
<header class="hdr">
  <div class="hdr-left"><a class="back-btn" href="../index.html">← Главная</a><span class="page-title">📌 Реестр допущений</span></div>
  <div class="hdr-right">B2BAPP | Данные на <span id="upd">—</span> <span id="freshness" class="freshness freshness-gray" style="margin-left:8px"></span><button class="pdf-btn" onclick="toggleTheme()" id="themeBtn" title="Переключить тему" style="margin-left:8px">🌙</button></div>
</header>
<div class="content" id="root"><div class="empty">Загрузка...</div></div>
<script>
fetch('../data/data.json?t='+Date.now()).then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent=d.updated||'—';
  
const items = d.assumptions || [];
document.getElementById('root').innerHTML=`<table class="tbl" id="tbl">
  <thead><tr><th>ID</th><th>Допущение</th><th>Последствие нарушения</th><th>Ответственный</th><th>Источник</th></tr></thead>
  <tbody>${items.map(a=>`<tr>
    <td><span class="badge badge-blue">${a.id}</span></td>
    <td>${a.desc}</td>
    <td style="font-size:11px;color:#e67e22">${a.impact}</td>
    <td style="font-size:11px;color:var(--mute)">${a.owner}</td>
    <td style="font-size:10px;color:var(--mute)">${a.link?`<a href="${a.link}" target="_blank" rel="noopener">${a.source||'источник'}</a>`:(a.source||'—')}</td>
  </tr>`).join('')}</tbody></table>`;
makeSortable(document.getElementById('tbl'));
});
</script></div><!-- /main --></div><!-- /layout -->
</body></html>
